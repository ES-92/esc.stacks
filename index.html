<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<link rel="icon" href="data:," />
<link rel="manifest" href="./manifest.webmanifest" />
<meta name="theme-color" content="#0e1116" />
<link rel="apple-touch-icon" href="./icon-180.png" />
<title>esc//stacks</title>
<style>
  :root{
    --bg:#0e1116; --bg2:#161b24; --line:#262d38; --line-soft:#1d232c;
    --amber:#e0a458; --amber-hi:#f4c88c; --amber-dim:rgba(224,164,88,.14);
    --txt:#e8e6e1; --txt-dim:#9aa0a8; --txt-faint:#5d646e;
    --paper:#171310; --ink:#e9e0d2;
    --serif:"Iowan Old Style",Palatino,Georgia,"Times New Roman",serif;
    --ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
    --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);font-family:var(--ui)}
  body{display:flex;flex-direction:column;overflow:hidden}
  button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
  .hidden{display:none!important}

  header{display:flex;align-items:center;gap:10px;padding:calc(12px + var(--safe-t)) 16px 10px;flex:none}
  .brand{flex:1;font-weight:600;font-size:19px;letter-spacing:.2px}
  .brand .s{color:var(--amber);font-weight:700}.brand .d{color:var(--txt-dim);font-weight:500}
  .iconbtn{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;color:var(--txt-dim);border:1px solid var(--line)}
  .iconbtn:hover{color:var(--txt);background:var(--bg2)}.iconbtn svg{width:20px;height:20px}

  main{flex:1;overflow:auto;padding:0 16px 28px;min-height:0}
  .toolbar{display:flex;gap:10px;margin:8px 0 12px}
  .search{flex:1;display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:0 12px}
  .search svg{width:16px;height:16px;color:var(--txt-faint)}
  .search input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-size:14px;padding:11px 0}
  .filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .fchip{font-size:13px;color:var(--txt-dim);background:var(--bg2);border:1px solid var(--line);border-radius:99px;padding:7px 15px}
  .fchip.active{background:var(--amber-dim);border-color:var(--amber);color:var(--amber-hi);font-weight:600}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:18px 14px}
  .card{cursor:pointer}
  .cw{position:relative;aspect-ratio:1;border-radius:12px;overflow:hidden;background:var(--bg2);border:1px solid var(--line);box-shadow:0 8px 22px rgba(0,0,0,.35)}
  .cw img{width:100%;height:100%;object-fit:cover}
  .cw .fb{width:100%;height:100%;display:grid;place-items:center;font-family:var(--serif);color:var(--txt-faint);padding:14px;text-align:center;font-size:15px}
  .badge{position:absolute;top:7px;left:7px;font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;
    background:rgba(14,17,22,.82);color:var(--amber-hi);padding:3px 7px;border-radius:6px;backdrop-filter:blur(4px)}
  .cp{position:absolute;left:0;right:0;bottom:0;height:4px;background:rgba(0,0,0,.4)}
  .cp>i{display:block;height:100%;background:var(--amber)}
  .ct{font-family:var(--serif);font-size:14.5px;margin:8px 2px 1px;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .ca{color:var(--txt-dim);font-size:12px;margin:0 2px}
  .empty{text-align:center;color:var(--txt-faint);padding:70px 20px;font-size:14px;line-height:1.6}

  /* Item-Ansicht */
  #itemView{flex:1;display:flex;flex-direction:column;min-height:0}
  .itembar{display:flex;align-items:center;gap:10px;padding:calc(10px + var(--safe-t)) 14px 8px;flex:none}
  #stage{flex:1;position:relative;min-height:0;padding:0 14px calc(10px + var(--safe-b))}

  .toast{position:fixed;left:50%;bottom:calc(28px + var(--safe-b));transform:translate(-50%,16px);background:var(--bg2);border:1px solid var(--line);
    border-radius:11px;padding:11px 16px;font-size:13px;opacity:0;pointer-events:none;transition:.2s;z-index:80}
  .toast.show{opacity:1;transform:translate(-50%,0)}

  /* Mini-Player */
  .mini{position:fixed;left:10px;right:10px;bottom:calc(10px + var(--safe-b));z-index:70;display:flex;align-items:center;gap:11px;
    background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:8px 10px;
    box-shadow:0 10px 34px rgba(0,0,0,.5);max-width:560px;margin:0 auto}
  .mini .mcover{width:42px;height:42px;border-radius:9px;overflow:hidden;background:var(--bg);flex:none;border:1px solid var(--line)}
  .mini .mcover img{width:100%;height:100%;object-fit:cover}
  .mini .mtxt{flex:1;min-width:0}
  .mini .mt{font-family:var(--serif);font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mini .mc{font-family:var(--mono);font-size:11px;color:var(--txt-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mini .iconbtn{width:38px;height:38px;border:none}
  .mini .mtg{background:var(--amber);color:#1a1208}.mini .mtg svg{width:20px;height:20px}
  .mini .mcl{color:var(--txt-faint)}

  /* Einstellungen-Sheet */
  .scrim{position:fixed;inset:0;background:rgba(6,8,11,.6);opacity:0;pointer-events:none;transition:.25s;z-index:74}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:75;background:var(--bg2);border-top:1px solid var(--line);
    border-radius:20px 20px 0 0;padding:10px 18px calc(22px + var(--safe-b));max-width:560px;margin:0 auto;
    transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1)}
  .sheet.show{transform:none}
  .sheet .handle{width:38px;height:4px;border-radius:99px;background:var(--line);margin:2px auto 12px}
  .sheet h3{font-family:var(--serif);font-weight:500;margin:0 4px 8px}
  .srow{display:flex;flex-direction:column;align-items:flex-start;gap:2px;width:100%;text-align:left;padding:13px 12px;border:none;background:none;color:var(--txt);font-size:15px;border-radius:11px}
  .srow:hover{background:var(--bg)}
  .srow .sub{font-size:12px;color:var(--txt-dim);font-family:var(--mono)}
  .srow.info{color:var(--txt-faint);font-size:12.5px;font-family:var(--mono);padding-top:14px}
  .sgroup{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--txt-faint);margin:14px 6px 4px}
  .srow.tog,.srow.segrow{flex-direction:row;align-items:center;justify-content:space-between}
  .sw{width:42px;height:25px;border-radius:99px;background:var(--line);position:relative;flex:none;transition:.2s}
  .sw::after{content:"";position:absolute;top:3px;left:3px;width:19px;height:19px;border-radius:50%;background:#fff;transition:.2s}
  .srow.tog.on .sw{background:var(--amber)}
  .srow.tog.on .sw::after{transform:translateX(17px)}
  .sheet .seg{display:flex;gap:6px}
  .sheet .seg button{border:1px solid var(--line);border-radius:8px;padding:7px 11px;color:var(--txt-dim);font-family:var(--mono);font-size:12px;background:var(--bg)}
  .sheet .seg button.active{border-color:var(--amber);background:var(--amber-dim);color:var(--amber-hi)}

  /* Statistik */
  .st-top{display:flex;gap:10px;margin:6px 2px 16px}
  .st-card{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:13px 12px}
  .st-card .v{font-family:var(--serif);font-size:22px;color:var(--amber-hi);line-height:1}
  .st-card .l{font-size:11px;color:var(--txt-dim);font-family:var(--mono);margin-top:5px}
  .st-chart{display:flex;align-items:flex-end;gap:7px;height:108px;padding:6px 4px 0}
  .st-bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%}
  .st-bar .col{width:100%;flex:1;display:flex;align-items:flex-end}
  .st-bar .col i{display:block;width:100%;background:linear-gradient(180deg,var(--amber-hi),var(--amber));border-radius:5px 5px 0 0;min-height:3px;transition:height .3s}
  .st-bar .col i.zero{background:var(--line)}
  .st-bar .d{font-size:10px;color:var(--txt-faint);font-family:var(--mono)}
  .st-bar.today .d{color:var(--amber-hi)}
</style>
</head>
<body>

  <!-- Bibliothek -->
  <div id="libView" style="display:flex;flex-direction:column;flex:1;min-height:0">
    <header>
      <div class="brand"><span>esc</span><span class="s">//</span><span class="d">stacks</span></div>
      <button class="iconbtn" id="settingsBtn" aria-label="Einstellungen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6h.09A1.65 1.65 0 0 0 10 3.09V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9v.09c0 .67.39 1.28 1.01 1.51H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <button class="iconbtn" id="importBtn" aria-label="Hinzufügen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <input type="file" id="file" accept=".epub,application/epub+zip,audio/*,.m4b,.m4a,.mp3" multiple hidden />
      <input type="file" id="bakInput" accept=".escstacks" hidden />
    </header>
    <main>
      <div class="toolbar">
        <div class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
          <input type="text" id="libSearch" placeholder="Suchen — Titel oder Autor" />
        </div>
      </div>
      <div class="filters" id="filters">
        <button class="fchip active" data-f="all">Alle</button>
        <button class="fchip" data-f="audio">Hörbücher</button>
        <button class="fchip" data-f="music">Musik</button>
        <button class="fchip" data-f="reader">Bücher</button>
      </div>
      <div class="grid" id="grid"></div>
    </main>
  </div>

  <!-- Einzel-Item (Modul-Stage) -->
  <div id="itemView" class="hidden">
    <div class="itembar">
      <button class="iconbtn" id="backBtn" aria-label="Zurück">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
    </div>
    <div id="stage"></div>
  </div>

  <!-- Hinzufügen-Menü -->
  <div class="sheet" id="addSheet">
    <div class="handle"></div>
    <h3>Hinzufügen</h3>
    <button class="srow" id="addAudio"><span>Hörbuch</span><span class="sub">M4B/MP3 mit Kapiteln</span></button>
    <button class="srow" id="addMusic"><span>Musik</span><span class="sub">Album · Tracks (MP3/FLAC …)</span></button>
    <button class="srow" id="addBook"><span>Buch</span><span class="sub">EPUB</span></button>
  </div>

  <!-- Einstellungen -->
  <div class="scrim" id="scrim"></div>
  <div class="sheet" id="settingsSheet">
    <div class="handle"></div>
    <h3>Einstellungen</h3>
    <div class="sgroup">Audio</div>
    <button class="srow tog" id="togSilence"><span>Stille überspringen</span><span class="sw"></span></button>
    <button class="srow tog" id="togNormalize"><span>Lautstärke normalisieren</span><span class="sw"></span></button>
    <div class="srow segrow"><span>Sprung zurück</span><div class="seg" id="segBack"></div></div>
    <div class="srow segrow"><span>Sprung vor</span><div class="seg" id="segFwd"></div></div>
    <div class="sgroup">Bibliothek</div>
    <button class="srow" id="optStats"><span>Statistik</span><span class="sub">Hör- &amp; Lesezeit · Streak</span></button>
    <button class="srow" id="optExport"><span>Sicherung exportieren</span><span class="sub">Alles als .escstacks</span></button>
    <button class="srow" id="optImport"><span>Sicherung importieren</span><span class="sub">.escstacks einlesen</span></button>
    <div class="srow info"><span>Installierbar als App · läuft offline</span></div>
  </div>

  <!-- Statistik -->
  <div class="sheet" id="statsSheet">
    <div class="handle"></div>
    <h3>Statistik</h3>
    <div id="statsBody"></div>
  </div>

  <!-- Mini-Player (Audio läuft im Hintergrund weiter) -->
  <div id="mini" class="mini hidden">
    <div class="mcover" id="miniCover"></div>
    <div class="mtxt" id="miniOpen"><div class="mt" id="miniTitle"></div><div class="mc" id="miniChap"></div></div>
    <button class="iconbtn mtg" id="miniToggle" aria-label="Wiedergabe"></button>
    <button class="iconbtn mcl" id="miniClose" aria-label="Schließen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
  </div>

  <div class="toast" id="toast"></div>

  <script src="./meta.js"></script>
  <script type="module" src="./shell.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
